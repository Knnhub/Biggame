<section class="login-page">
  <div class="card">
    <h1 class="brand">BIGgame</h1>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="Value" />

      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" placeholder="Value" />

      <button class="btn" [disabled]="loading || form.invalid" type="submit">Login</button>

      <p class="signup">
        <span>Not a member yet?</span>
        <a href="/register">Register</a>
      </p>
    </form>
  </div>
</section>
