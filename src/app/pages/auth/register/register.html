<section class="card">
<h2>Register</h2>
<form [formGroup]="form" (ngSubmit)="submit()">
<label>Username</label>
<input type="text" formControlName="username" placeholder="gamer123" />
<div class="error" *ngIf="form.get('username')?.invalid && form.get('username')?.touched">อย่างน้อย 3 ตัวอักษร</div>


<label>Email</label>
<input type="email" formControlName="email" placeholder="you@example.com" />
<div class="error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">อีเมลไม่ถูกต้อง</div>


<label>Password</label>
<input type="password" formControlName="password" placeholder="อย่างน้อย 6 ตัว" />


<label>Confirm Password</label>
<input type="password" formControlName="confirm" />
<div class="error" *ngIf="form.get('confirm')?.hasError('mismatch')">รหัสผ่านไม่ตรงกัน</div>


<button [disabled]="loading || form.invalid" type="submit">สร้างบัญชี</button>
<p class="muted">มีบัญชีแล้ว? <a routerLink="/login">เข้าสู่ระบบ</a></p>
</form>
</section>
