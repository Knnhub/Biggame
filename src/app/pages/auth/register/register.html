<section class="register-page">
  <div class="card">
    <!-- อัปโหลดรูปโปรไฟล์ -->
    <label class="avatar-uploader" for="avatarInput" title="Upload avatar">
      <ng-container *ngIf="!avatarPreview; else preview">
        <!-- ไอคอนรูปภาพ + เครื่องหมาย + -->
        <svg width="64" height="64" viewBox="0 0 24 24" class="icon">
          <rect x="3" y="3" width="18" height="14" rx="2" ry="2" fill="none" stroke="#111" stroke-width="1.5"/>
          <circle cx="9" cy="8" r="2" fill="none" stroke="#111" stroke-width="1.5"/>
          <path d="M21 16l-5-5-6 6" fill="none" stroke="#111" stroke-width="1.5"/>
        </svg>
        <span class="plus">+</span>
      </ng-container>
      <ng-template #preview>
        <img [src]="avatarPreview!" alt="avatar" />
      </ng-template>
    </label>
    <input id="avatarInput" type="file" accept="image/*" (change)="onAvatarChange($event)" hidden />

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <label for="name">Name</label>
      <input id="name" type="text" formControlName="username" placeholder="Value" />

      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="Value" />

      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" placeholder="Value" />

      <button class="btn" [disabled]="loading || form.invalid" type="submit">Register</button>

      <p class="login-link">
        <span>*Already a member?</span>
        <a href="/login">login</a>
      </p>
    </form>
  </div>
</section>
